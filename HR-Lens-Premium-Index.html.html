                            <div className="bg-white/10 backdrop-blur-md rounded-xl p-4 border border-white/20">
                                <label className="text-xs font-bold text-purple-300 uppercase block mb-2">📈 Company Size</label>
                                <select
                                    value={filters.companySize || ''}
                                    onChange={e => setFilters({ ...filters, companySize: e.target.value || null })}
                                    className="w-full px-3 py-2 rounded-lg bg-white/5 text-white text-sm border border-white/10 focus:border-purple-500 focus:outline-none"
                                >
                                    <option value="">All Sizes</option>
                                    <option value="smb">SMB</option>
                                    <option value="mid-market">Mid-Market</option>
                                    <option value="enterprise">Enterprise</option>
                                </select>
                            </div>
                            <div className="bg-white/10 backdrop-blur-md rounded-xl p-4 border border-white/20">
                                <label className="text-xs font-bold text-purple-300 uppercase block mb-2">🎯 Priority</label>
                                <select
                                    value={filters.priority || ''}
                                    onChange={e => setFilters({ ...filters, priority: e.target.value || null })}
                                    className="w-full px-3 py-2 rounded-lg bg-white/5 text-white text-sm border border-white/10 focus:border-purple-500 focus:outline-none"
                                >
                                    <option value="">All Priorities</option>
                                    <option value="compliance">Compliance</option>
                                    <option value="culture">Culture</option>
                                    <option value="automation">Automation</option>
                                </select>
                            </div>
                            <div className="bg-white/10 backdrop-blur-md rounded-xl p-4 border border-white/20">
                                <label className="text-xs font-bold text-purple-300 uppercase block mb-2">💰 Budget</label>
                                <select
                                    value={filters.budget || ''}
                                    onChange={e => setFilters({ ...filters, budget: e.target.value || null })}
                                    className="w-full px-3 py-2 rounded-lg bg-white/5 text-white text-sm border border-white/10 focus:border-purple-500 focus:outline-none"
                                >
                                    <option value="">All Budgets</option>
                                    <option value="budget-friendly">Budget</option>
                                    <option value="mid-range">Mid-Range</option>
                                    <option value="premium">Premium</option>
                                </select>
                            </div>
                        </div>

                        {/* Selected for Compare */}
                        {selectedForCompare.length > 0 && (
                            <div className="gradient-primary rounded-xl p-6 mb-8 text-white shadow-lg animate-fade-in-up">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <span className="text-3xl">🔍</span>
                                        <div>
                                            <p className="font-bold text-lg">Comparison Ready</p>
                                            <p className="text-purple-200">You have selected {selectedForCompare.length} system{selectedForCompare.length > 1 ? 's' : ''}</p>
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => setCompareMode(true)}
                                        className="px-6 py-3 bg-white text-purple-600 font-bold rounded-lg hover:bg-purple-50 transition-all"
                                    >
                                        View Comparison
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Results Count */}
                        <div className="text-gray-300 mb-4 font-semibold">
                            Showing <span className="text-purple-400">{filteredSystems.length}</span> of <span className="text-purple-400">{systems.length}</span> systems
                        </div>

                        {/* Systems Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                            {filteredSystems.map((sys, idx) => (
                                <div
                                    key={sys.id}
                                    onClick={() => setSelectedSystem(sys)}
                                    className={`card-hover cursor-pointer rounded-xl border backdrop-blur-md transition-all p-6 ${
                                        selectedSystem?.id === sys.id
                                            ? 'border-purple-500 bg-purple-500/20 shadow-lg'
                                            : 'border-white/20 bg-white/10 hover:border-purple-400/50'
                                    }`}
                                    style={{ animationDelay: `${idx * 50}ms` }}
                                >
                                    <div className="flex items-start gap-4 mb-4">
                                        <div className={`icon-box text-3xl`} style={{ background: 'rgba(168, 85, 247, 0.2)' }}>
                                            {sys.icon}
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="inline-block px-2 py-1 rounded text-xs font-bold text-purple-300 bg-purple-500/30">#{sys.rank}</span>
                                                <span className="text-xs text-gray-400">{sys.region}</span>
                                            </div>
                                            <h3 className="text-xl font-bold text-white">{sys.name}</h3>
                                            <p className="text-sm text-gray-300">{sys.tagline}</p>
                                        </div>
                                    </div>

                                    <div className="flex gap-2 flex-wrap mb-4">
                                        <span className={`inline-block px-3 py-1 text-xs font-bold rounded-full text-white ${budgetColors[sys.budgetTier]}`}>
                                            {sys.budgetTier}
                                        </span>
                                        <span className="inline-block px-3 py-1 text-xs font-bold rounded-full bg-blue-500/30 text-blue-200">
                                            {currencySymbol}{convertPrice(sys.pricing.min)}-{currencySymbol}{convertPrice(sys.pricing.max)}
                                        </span>
                                        <span className="inline-block px-3 py-1 text-xs font-bold rounded-full bg-yellow-500/30 text-yellow-200">
                                            {sys.scalability}/10
                                        </span>
                                    </div>

                                    {selectedSystem?.id === sys.id && (
                                        <div className="mt-4 pt-4 border-t border-white/10 space-y-3 animate-fade-in-up">
                                            <div className="gradient-accent rounded-lg p-3 text-white">
                                                <p className="text-xs font-bold opacity-90">MONTHLY COST ({employeeCount.toLocaleString()} employees)</p>
                                                <p className="text-2xl font-bold mt-1">
                                                    {currencySymbol}{convertPrice(calculateCost(sys).min).toLocaleString()} - {currencySymbol}{convertPrice(calculateCost(sys).max).toLocaleString()}
                                                </p>
                                            </div>
                                            <div>
                                                <p className="text-xs font-bold text-purple-300 mb-2">✨ Why Choose {sys.name}?</p>
                                                <p className="text-sm text-gray-300">{sys.usp}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        if (!selectedForCompare.find(s => s.id === sys.id)) {
                                                            setSelectedForCompare([...selectedForCompare, sys]);
                                                        }
                                                    }}
                                                    className="flex-1 px-3 py-2 bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold rounded-lg transition"
                                                >
                                                    ➕ Add to Compare
                                                </button>
                                                <a
                                                    href={sys.website}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="flex-1 px-3 py-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white text-xs font-bold rounded-lg transition text-center"
                                                >
                                                    🌐 Visit
                                                </a>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Comparison Modal */}
                    {compareMode && selectedForCompare.length > 0 && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-gray-900 rounded-2xl max-w-6xl w-full max-h-96 overflow-y-auto border border-purple-500/30 shadow-2xl">
                                <div className="sticky top-0 gradient-primary px-6 py-4 flex justify-between items-center text-white">
                                    <h2 className="text-2xl font-bold">Comparing {selectedForCompare.length} Systems</h2>
                                    <button
                                        onClick={() => setCompareMode(false)}
                                        className="text-2xl hover:opacity-80"
                                    >
                                        ✕
                                    </button>
                                </div>

                                <div className="p-6">
                                    <div className="overflow-x-auto mb-6">
                                        <table className="w-full text-sm text-gray-300">
                                            <thead>
                                                <tr className="border-b border-purple-500/30">
                                                    <th className="text-left py-3 px-4 font-bold text-purple-400">Feature</th>
                                                    {selectedForCompare.map(s => (
                                                        <th key={s.id} className="text-left py-3 px-4 font-bold text-purple-400 min-w-48">
                                                            <div className="text-lg mb-1">{s.icon}</div>
                                                            <div className="font-bold text-white">{s.name}</div>
                                                            <div className="text-xs">{s.region}</div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr className="border-b border-purple-500/30">
                                                    <td className="py-3 px-4 font-bold text-purple-300">Budget</td>
                                                    {selectedForCompare.map(s => (
                                                        <td key={s.id} className="py-3 px-4">
                                                            <span className={`inline-block px-3 py-1 text-xs font-bold rounded-full text-white ${budgetColors[s.budgetTier]}`}>
                                                                {s.budgetTier}
                                                            </span>
                                                        </td>
                                                    ))}
                                                </tr>
                                                <tr className="border-b border-purple-500/30">
                                                    <td className="py-3 px-4 font-bold text-purple-300">Cost ({employeeCount.toLocaleString()} emp)</td>
                                                    {selectedForCompare.map(s => {
                                                        const cost = calculateCost(s);
                                                        return (
                                                            <td key={s.id} className="py-3 px-4">
                                                                <span className="font-bold text-cyan-400">
                                                                    {currencySymbol}{convertPrice(cost.min).toLocaleString()} - {currencySymbol}{convertPrice(cost.max).toLocaleString()}
                                                                </span>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                                <tr className="border-b border-purple-500/30">
                                                    <td className="py-3 px-4 font-bold text-purple-300">Scalability</td>
                                                    {selectedForCompare.map(s => (
                                                        <td key={s.id} className="py-3 px-4">
                                                            <div className="flex items-center gap-2">
                                                                <div className="flex-1 h-2 bg-gray-700 rounded-full overflow-hidden">
                                                                    <div className="h-full gradient-primary" style={{ width: `${(s.scalability / 10) * 100}%` }}></div>
                                                                </div>
                                                                <span className="font-bold text-purple-300">{s.scalability}/10</span>
                                                            </div>
                                                        </td>
                                                    ))}
                                                </tr>
                                                <tr>
                                                    <td className="py-3 px-4 font-bold text-purple-300">Setup Time</td>
                                                    {selectedForCompare.map(s => (
                                                        <td key={s.id} className="py-3 px-4 text-gray-300">{s.setupTime}</td>
                                                    ))}
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                    <div className="flex gap-3 flex-wrap">
                                        <button
                                            onClick={() => {
                                                setCompareMode(false);
                                                setSelectedForCompare([]);
                                            }}
                                            className="flex-1 px-4 py-2 border border-purple-500/50 text-purple-300 font-bold rounded-lg hover:bg-purple-500/10 transition"
                                        >
                                            Close
                                        </button>
                                        {selectedForCompare.map(s => (
                                            <a
                                                key={s.id}
                                                href={s.website}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="flex-1 px-4 py-2 gradient-primary text-white font-bold rounded-lg hover:shadow-lg transition text-center"
                                            >
                                                Visit {s.name} →
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
